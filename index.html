<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZCU VOLEJBAL PLZEŇ - Hlasování</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- HEADER -->
        <header class="flex flex-col items-center mb-10 relative">
            <div class="absolute right-0 top-0" id="admin-toggle-container"></div>
            <div class="flex flex-col items-center gap-4">
                <div id="main-logo-container" class="bg-white p-4 rounded-3xl shadow-xl shadow-blue-100/50 border border-blue-50 w-24 h-24 flex items-center justify-center overflow-hidden">
                    <div class="animate-pulse bg-slate-100 w-full h-full rounded-full"></div>
                </div>
                <div class="text-center">
                    <h1 id="main-title-display" class="text-3xl font-black tracking-tight text-slate-900 uppercase italic">ZCU VOLEJBAL PLZEŇ</h1>
                    <div class="h-1.5 w-24 bg-blue-600 rounded-full mx-auto mt-2"></div>
                </div>
            </div>
        </header>

        <!-- ERROR MESSAGE -->
        <div id="error-box" class="hidden max-w-2xl mx-auto mb-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-xl text-sm font-medium flex justify-between items-center">
            <span id="error-msg"></span>
            <button onclick="hideError()" class="text-xs font-bold underline uppercase">Zavřít</button>
        </div>

        <!-- MAIN CONTENT AREA -->
        <main id="view-container">
            <div class="flex flex-col justify-center items-center py-20 gap-4">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest">Připojování k serveru...</p>
            </div>
        </main>
    </div>

    <!-- Visual Decor -->
    <div class="fixed top-0 left-0 w-full h-1.5 bg-gradient-to-r from-orange-500 via-blue-500 to-blue-700 z-50"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, addDoc, collection, onSnapshot, query, serverTimestamp, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================================
        // 1. FIREBASE KONFIGURACE
        // ==========================================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyC3-hhGrBa-BZ7nMc6bQ-2ujPtjzjsfrSo",
            authDomain: "web-favplayer.firebaseapp.com",
            projectId: "web-favplayer",
            storageBucket: "web-favplayer.firebasestorage.app",
            messagingSenderId: "179637600152",
            appId: "1:179637600152:web:e7adf1289592a4f41a35ed",
            measurementId: "G-RPKXK5CK8B"
        };

        const ADMIN_PASSWORD_HASH = "46cab7d0a7cb198437be0c529583e6f226bd978121737ed6a1632fdf99ac3510"; 
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'volleyball-vote';

        const DEFAULT_SETTINGS = {
            mainLogo: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/ZCU_logo.svg/1024px-ZCU_logo.svg.png",
            mainTitle: "ZCU VOLEJBAL PLZEŇ",
            resetId: "initial-session",
            home: { name: "ZČU Plzeň", logo: null, players: [{ id: 'h1', name: 'Hráč ZČU 1' }] },
            away: { name: "Hostující tým", logo: null, players: [{ id: 'a1', name: 'Hráč Hostů 1' }] }
        };

        // --- STAVY ---
        let db, auth, user;
        let settings = DEFAULT_SETTINGS;
        let votes = [];
        let currentView = 'vote'; 
        let selectedTeamId = null;
        let selectedPlayer = null;
        let hasVotedHome = localStorage.getItem(`voted_home_${APP_ID}`) === 'true';
        let hasVotedAway = localStorage.getItem(`voted_away_${APP_ID}`) === 'true';
        let sessionTicket = localStorage.getItem(`session_ticket_${APP_ID}`);
        let adminTab = 'results'; 
        let winner = null;
        let isDrawing = false;
        let unsubscribeSettings, unsubscribeVotes;

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function init() {
            render();

            if (!firebaseConfig.apiKey || firebaseConfig.apiKey === "SEM-VLOŽTE-API-KEY") {
                if (typeof __firebase_config === 'undefined') {
                    showError("Doplňte konfiguraci Firebase v kódu.");
                    return;
                }
            }

            try {
                const firebaseApp = initializeApp(firebaseConfig);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);

                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (u) subscribeToData();
                });

                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { 
                console.error(err);
                showError("Chyba připojení k serveru.");
            }

            if (hasVotedHome && hasVotedAway) currentView = 'success';
            render();
        }

        function subscribeToData() {
            if (!user) return;
            const settingsRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'teams');
            
            unsubscribeSettings = onSnapshot(settingsRef, (snap) => {
                if (snap.exists()) { 
                    const newData = snap.data();
                    const localResetId = localStorage.getItem(`last_reset_id_${APP_ID}`);
                    
                    if (newData.resetId && newData.resetId !== localResetId) {
                        localStorage.removeItem(`voted_home_${APP_ID}`);
                        localStorage.removeItem(`voted_away_${APP_ID}`);
                        localStorage.removeItem(`session_ticket_${APP_ID}`);
                        localStorage.setItem(`last_reset_id_${APP_ID}`, newData.resetId);
                        
                        hasVotedHome = false;
                        hasVotedAway = false;
                        sessionTicket = null;
                        winner = null; 
                        
                        if (currentView === 'success' || currentView === 'players') {
                            currentView = 'vote';
                        }
                    } else if (!localResetId) {
                        localStorage.setItem(`last_reset_id_${APP_ID}`, newData.resetId || "initial-session");
                    }

                    settings = newData; 
                    render(); 
                } else { 
                    setDoc(settingsRef, DEFAULT_SETTINGS).catch(console.error); 
                }
            }, (err) => {
                if (err.code === 'permission-denied') showError("Chyba oprávnění v databázi.");
            });

            const votesRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'votes');
            unsubscribeVotes = onSnapshot(votesRef, (snap) => {
                votes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                
                if (votes.length === 0) {
                    winner = null;
                }
                
                if (currentView === 'admin-dashboard') render();
            });
        }

        window.setView = (v) => { currentView = v; render(); };
        window.selectTeam = (teamId) => { selectedTeamId = teamId; currentView = 'players'; render(); };
        window.selectPlayer = (playerId, name) => { selectedPlayer = { id: playerId, name }; render(); };
        
        window.submitVote = async () => {
            if (!selectedPlayer || !user) return;
            
            if (!sessionTicket) {
                const ticket = Array.from({length: 4}, () => "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"[Math.floor(Math.random()*32)]).join('');
                sessionTicket = `ZCU-${ticket}`;
                localStorage.setItem(`session_ticket_${APP_ID}`, sessionTicket);
            }

            try {
                await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'votes'), {
                    playerId: selectedPlayer.id, playerName: selectedPlayer.name,
                    teamId: selectedTeamId, teamName: settings[selectedTeamId].name,
                    ticketId: sessionTicket, timestamp: serverTimestamp(), userId: user.uid
                });
                if (selectedTeamId === 'home') { hasVotedHome = true; localStorage.setItem(`voted_home_${APP_ID}`, 'true'); }
                else { hasVotedAway = true; localStorage.setItem(`voted_away_${APP_ID}`, 'true'); }
                selectedPlayer = null; selectedTeamId = null;
                currentView = (hasVotedHome && hasVotedAway) ? 'success' : 'vote';
                render();
            } catch (err) { showError("Nepodařilo se odeslat hlas."); }
        };

        window.handleAdminLogin = async (e) => {
            e.preventDefault();
            const pass = document.getElementById('admin-pass').value;
            const inputHash = await sha256(pass);
            if (inputHash === ADMIN_PASSWORD_HASH) { currentView = 'admin-dashboard'; render(); }
            else { showError("Nesprávné heslo."); }
        };

        window.drawWinner = () => {
            if (votes.length === 0) return;
            isDrawing = true; render();
            setTimeout(() => {
                const unique = Array.from(new Set(votes.map(v => v.ticketId)));
                const rid = unique[Math.floor(Math.random() * unique.length)];
                winner = votes.find(v => v.ticketId === rid);
                isDrawing = false; render();
            }, 1500);
        };

        window.resetVotes = async () => {
            if (!confirm("OPRAVDU CHCETE RESTARTOVAT HLASOVÁNÍ?\n\n- Vítezný kód bude okamžitě vymazán.\n- Smažou se všechna data o aktuálních hlasech z databáze.\n- Všem divákům se znovu povolí hlasování pro domácí i hosty.")) return;
            
            winner = null;
            votes = [];
            hasVotedHome = false;
            hasVotedAway = false;
            sessionTicket = null;
            localStorage.removeItem(`voted_home_${APP_ID}`);
            localStorage.removeItem(`voted_away_${APP_ID}`);
            localStorage.removeItem(`session_ticket_${APP_ID}`);
            render();

            try {
                const newResetId = "reset-" + Date.now();
                settings.resetId = newResetId;
                localStorage.setItem(`last_reset_id_${APP_ID}`, newResetId);
                await saveSettings();

                const votesCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'votes');
                const snap = await getDocs(votesCol);
                
                if (snap.docs.length > 0) {
                    const batch = writeBatch(db);
                    snap.docs.forEach(d => batch.delete(d.ref));
                    await batch.commit(); 
                }
                
                winner = null;
                render();
            } catch (e) { 
                console.error(e);
                showError("Chyba při restartu databáze."); 
            }
        };

        window.updateTeamName = (tid, n) => { settings[tid].name = n; saveSettings(); };
        window.addPlayer = (tid) => {
            const i = document.getElementById(`new-player-${tid}`);
            const n = i.value.trim(); if (!n) return;
            settings[tid].players.push({ id: Date.now().toString(), name: n });
            i.value = ""; saveSettings();
        };
        window.removePlayer = (tid, pid) => { settings[tid].players = settings[tid].players.filter(p => p.id !== pid); saveSettings(); };
        window.updateMainTitle = (t) => { settings.mainTitle = t; saveSettings(); };
        window.handleFileUpload = (type, tid, e) => {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onloadend = () => { if (type === 'main') settings.mainLogo = r.result; else settings[tid].logo = r.result; saveSettings(); };
            r.readAsDataURL(f);
        };

        async function saveSettings() {
            if (user) await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'teams'), settings);
        }

        // --- RENDERING ---
        function render() {
            const container = document.getElementById('view-container');
            const adminBtnContainer = document.getElementById('admin-toggle-container');
            const logoContainer = document.getElementById('main-logo-container');
            const titleDisplay = document.getElementById('main-title-display');

            if (!container) return;

            titleDisplay.innerText = settings.mainTitle;
            logoContainer.innerHTML = `<img src="${settings.mainLogo}" class="max-w-full max-h-full object-contain p-1">`;
            
            if (currentView.startsWith('admin')) {
                adminBtnContainer.innerHTML = `<button onclick="setView('vote')" class="flex items-center gap-2 text-sm font-medium text-slate-500 p-2"><i data-lucide="log-out" class="w-4 h-4"></i> Zpět</button>`;
            } else {
                adminBtnContainer.innerHTML = `<button onclick="setView('admin-login')" class="text-slate-300 hover:text-blue-600 p-2"><i data-lucide="lock" class="w-5 h-5"></i></button>`;
            }

            let html = '';
            if (currentView === 'vote') html = renderVoteView();
            else if (currentView === 'players') html = renderPlayersView();
            else if (currentView === 'success') html = renderSuccessView();
            else if (currentView === 'admin-login') html = renderAdminLoginView();
            else if (currentView === 'admin-dashboard') html = renderAdminDashboardView();

            container.innerHTML = `<div class="animate-fade-in">${html}</div>`;
            if (window.lucide) lucide.createIcons();
        }

        function renderVoteView() {
            let ticketHtml = '';
            if (hasVotedHome && hasVotedAway && sessionTicket) {
                ticketHtml = `
                    <div class="mb-8 p-6 bg-blue-50 border border-blue-100 rounded-[2rem] flex flex-col items-center gap-2 animate-in shadow-sm">
                        <div class="flex items-center gap-2 text-blue-400">
                             <i data-lucide="ticket" class="w-4 h-4"></i>
                             <span class="text-[10px] font-black uppercase tracking-[0.2em]">Tvůj kód pro slosování</span>
                        </div>
                        <span class="text-3xl font-black text-blue-600 font-mono tracking-wider">${sessionTicket}</span>
                        <span class="text-[9px] font-bold text-green-600 uppercase mt-1">Hlasování dokončeno ✓</span>
                    </div>
                `;
            }

            return `<div class="max-w-2xl mx-auto space-y-6">
                ${ticketHtml}
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold mb-2 text-slate-800">Hlasuj pro své favority!</h2>
                    <p class="text-slate-500 text-sm">Zvol jednoho hráče z každého týmu pro slosování.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    ${renderTeamCard('home', hasVotedHome)}
                    ${renderTeamCard('away', hasVotedAway)}
                </div>
            </div>`;
        }

        function renderTeamCard(id, v) {
            const t = settings[id];
            // LOGIKA ZOBRAZENÍ LOGA TÝMU
            const logoContent = t.logo ? 
                `<img src="${t.logo}" class="w-full h-full object-cover">` : 
                `<i data-lucide="${id === 'home' ? 'shield-check' : 'users'}" class="w-10 h-10 ${id === 'home' ? 'text-blue-600' : 'text-orange-600'}"></i>`;

            return `<button ${v ? 'disabled' : `onclick="selectTeam('${id}')"`} class="group p-10 bg-white border-2 border-transparent rounded-[2.5rem] shadow-sm hover:shadow-2xl transition-all text-center relative ${v ? 'opacity-40 grayscale' : 'hover:border-blue-500 hover:-translate-y-1'}">
                ${v ? '<div class="absolute top-6 right-6 text-green-500"><i data-lucide="check-circle-2" class="w-8 h-8"></i></div>' : ''}
                <div class="w-20 h-20 rounded-full border-4 border-white shadow-lg overflow-hidden mb-4 mx-auto bg-white flex items-center justify-center">${logoContent}</div>
                <span class="block text-xs text-slate-400 font-bold uppercase mb-2">${id === 'home' ? 'Domácí' : 'Hosté'}</span><span class="text-2xl font-black text-slate-800 break-words">${t.name}</span>
                <div class="mt-6 flex items-center justify-center gap-2 text-[10px] font-black uppercase tracking-widest">${v ? '<span class="text-green-600">SPLNĚNO ✓</span>' : '<span class="text-blue-600 group-hover:gap-3 transition-all flex items-center gap-2 text-xs">VYBRAT HRÁČE <i data-lucide="chevron-right" class="w-4 h-4"></i></span>'}</div></button>`;
        }

        function renderPlayersView() {
            const t = settings[selectedTeamId];
            return `<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
                <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                    <button onclick="setView('vote')" class="flex items-center gap-1 text-sm font-semibold text-blue-600"><i data-lucide="chevron-left" class="w-4 h-4"></i> Zpět</button>
                    <!-- ZOBRAZENÍ LOGA TÝMU V HLAVIČCE VÝBĚRU -->
                    <div class="flex items-center gap-3">
                        ${t.logo ? `<img src="${t.logo}" class="w-8 h-8 rounded-full object-cover shadow-sm">` : ''}
                        <span class="text-sm font-bold text-slate-500 uppercase">${t.name}</span>
                    </div>
                </div>
                <div class="p-4 max-h-[400px] overflow-y-auto grid grid-cols-1 gap-2">${t.players.map(p => `<button onclick="selectPlayer('${p.id}', '${p.name}')" class="flex items-center justify-between p-5 rounded-2xl border-2 transition-all ${selectedPlayer?.id === p.id ? 'border-blue-500 bg-blue-50 shadow-inner' : 'border-slate-100 hover:border-slate-200'}"><span class="text-lg font-bold">${p.name}</span>${selectedPlayer?.id === p.id ? '<i data-lucide="chevron-right" class="text-blue-500"></i>' : ''}</button>`).join('')}</div>
                <div class="p-6 border-t"><button onclick="submitVote()" ${!selectedPlayer ? 'disabled' : ''} class="w-full py-5 rounded-2xl font-black text-white shadow-xl uppercase tracking-widest ${!selectedPlayer ? 'bg-slate-300' : 'bg-blue-600 hover:bg-blue-700'}">Potvrdit výběr</button></div></div>`;
        }

        function renderSuccessView() {
            return `<div class="max-w-2xl mx-auto space-y-4">
                <div class="bg-white rounded-2xl shadow-xl p-10 text-center border-t-8 border-blue-600">
                    <!-- ZOBRAZENÍ HLAVNÍHO LOGA NA OBRAZOVCE ÚSPĚCHU -->
                    <div class="mb-6 flex justify-center">
                        <div class="w-24 h-24 bg-white p-2 rounded-2xl shadow-md border border-slate-50 flex items-center justify-center overflow-hidden">
                            <img src="${settings.mainLogo}" class="max-w-full max-h-full object-contain">
                        </div>
                    </div>
                    <div class="bg-green-100 text-green-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check-circle-2" class="w-10 h-10"></i></div>
                    <h2 class="text-3xl font-black mb-2 text-slate-900 uppercase">Hlasování dokončeno!</h2>
                    <p class="text-slate-500 mb-10">Děkujeme za tvé hlasy. Zde je tvůj unikátní kód pro slosování o ceny:</p>
                    <div class="bg-slate-50 border-2 border-dashed rounded-[2.5rem] p-10 relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 bg-blue-600 text-white rounded-bl-3xl shadow-lg"><i data-lucide="ticket" class="w-6 h-6"></i></div>
                        <div class="text-[10px] font-black text-slate-400 uppercase tracking-[0.4em] mb-4">Slosovatelný lístek</div>
                        <div class="text-6xl font-black text-blue-600 tracking-[0.1em] font-mono select-all">${sessionTicket}</div>
                    </div>
                    <p class="text-sm text-slate-400 mt-10 italic">Pořiď si screenshot lístku pro případ výhry!</p>
                    <div class="mt-12 pt-8 border-t border-slate-50">
                        <button onclick="setView('vote')" class="text-blue-600 font-black text-xs uppercase tracking-widest flex items-center gap-2 mx-auto hover:gap-3 transition-all">
                            <i data-lucide="chevron-left" class="w-4 h-4"></i> Zpět na přehled
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function renderAdminLoginView() {
            return `<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-10"><div class="text-center mb-8"><div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4"><i data-lucide="lock" class="w-8 h-8"></i></div><h2 class="text-2xl font-black">Administrace</h2></div>
                <form onsubmit="handleAdminLogin(event)" class="space-y-4"><input type="password" id="admin-pass" placeholder="Heslo" class="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 focus:border-blue-500 outline-none text-center text-lg font-bold" /><button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 uppercase tracking-widest shadow-lg">Vstoupit</button></form></div>`;
        }

        function renderAdminDashboardView() {
            const sh = getTeamStats('home'); const sa = getTeamStats('away');
            const m = Math.max(...sh.map(s=>s.votes), ...sa.map(s=>s.votes), 1);
            return `<div class="space-y-6"><div class="flex bg-white rounded-2xl p-1 shadow-md border max-w-2xl mx-auto text-[10px] font-black uppercase">
                <button onclick="window.setAdminTab('results')" class="flex-1 py-3 rounded-xl ${adminTab === 'results' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400'}">VÝSLEDKY</button>
                <button onclick="window.setAdminTab('teams')" class="flex-1 py-3 rounded-xl ${adminTab === 'teams' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400'}">NASTAVENÍ</button></div>
                ${adminTab === 'results' ? `<div class="space-y-8"><div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8 border-2 border-blue-500 bg-blue-50/20 text-center"><h3 class="font-black text-xl mb-6 flex items-center justify-center gap-3 text-blue-900"><i data-lucide="gift" class="w-6 h-6"></i> SLOSOVÁNÍ O CENY</h3>
                <div class="bg-white rounded-3xl p-8 border min-h-[200px] flex flex-col items-center justify-center relative">
                    ${isDrawing ? `<i data-lucide="refresh-cw" class="w-12 h-12 animate-spin text-blue-600"></i>` : 
                      winner ? `<div class="animate-in zoom-in"><p class="text-xs font-black text-slate-400 uppercase mb-4">VÍTĚZNÝ KÓD</p><div class="text-7xl font-black text-blue-600 mb-4 font-mono tracking-tighter">${winner.ticketId}</div><p class="text-lg font-bold text-slate-700">Favorit výherce: ${winner.playerName}</p></div>` : 
                      `<p class="text-slate-400 font-bold">Připraveno k losování.</p>`}
                </div>
                <button onclick="drawWinner()" class="w-full mt-6 py-5 bg-blue-600 text-white rounded-2xl font-black hover:bg-blue-700 uppercase tracking-widest text-lg flex items-center justify-center gap-3 shadow-xl ${votes.length === 0 ? 'opacity-50 cursor-not-allowed' : ''}"><i data-lucide="refresh-cw" class="w-6 h-6"></i> LOSOVAT</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-8">${renderStatsCard('away', sa, m)}${renderStatsCard('home', sh, m)}</div>
                <button onclick="resetVotes()" class="block mx-auto px-6 py-2 bg-red-50 text-red-500 border border-red-100 rounded-xl font-black uppercase text-[10px] hover:bg-red-600 hover:text-white transition-all shadow-sm">Restartovat vše pro novou soutěž</button>
                </div>` : renderAdminSettings()}</div>`;
        }

        function renderStatsCard(id, stats, max) {
            return `<div class="bg-white rounded-2xl shadow-xl p-6 border-t-8 ${id === 'home' ? 'border-blue-600' : 'border-orange-500'}"><h3 class="font-black text-xl mb-6 flex items-center gap-3 ${id === 'home' ? 'text-blue-600' : 'text-orange-600'}"><i data-lucide="${id === 'home' ? 'shield-check' : 'users'}" class="w-5 h-5"></i> ${settings[id].name.toUpperCase()}</h3>
                <div class="space-y-6">${stats.map(p => `<div><div class="flex justify-between items-center mb-2"><span class="font-black text-slate-800 text-sm">${p.name}</span><span class="text-xs font-black">${p.votes} hl.</span></div><div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-gradient-to-r ${id === 'home' ? 'from-blue-500 to-blue-700' : 'from-orange-400 to-orange-600'}" style="width: ${(p.votes/max)*100}%"></div></div></div>`).join('')}</div></div>`;
        }

        function renderAdminSettings() {
            return `<div class="max-w-2xl mx-auto space-y-8"><div class="bg-white rounded-2xl p-8 border-l-[12px] border-blue-600 shadow-xl"><div class="flex items-center gap-6 pb-6 border-b border-slate-100"><div class="relative"><div class="w-32 h-32 rounded-3xl bg-slate-100 border flex items-center justify-center overflow-hidden"><img src="${settings.mainLogo}" class="max-w-full max-h-full object-contain"></div><label class="absolute bottom-0 right-0 w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center cursor-pointer border-4 border-white shadow-lg"><input type="file" class="hidden" onchange="window.handleFileUpload('main', null, event)"><i data-lucide="camera" class="w-4 h-4"></i></label></div>
                <div class="flex-1 w-full"><h3 class="text-xl font-black mb-1 text-slate-800">Hlavní Logo</h3><label class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold cursor-pointer hover:bg-slate-200 transition-colors"><input type="file" class="hidden" onchange="window.handleFileUpload('main', null, event)">ZMĚNIT OBRÁZEK</label></div></div><div class="w-full mt-4"><label class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 block">Hlavní název</label><input type="text" value="${settings.mainTitle}" onchange="window.updateMainTitle(this.value)" class="w-full px-4 py-4 bg-slate-50 border-2 rounded-2xl font-black text-xl outline-none focus:border-blue-500" /></div></div>
                ${['away', 'home'].map(tId => `<div class="bg-white rounded-2xl p-8 border-l-[12px] ${tId === 'home' ? 'border-blue-600' : 'border-orange-500'} shadow-xl"><div class="flex items-center gap-6 pb-6 border-b border-slate-100"><div class="relative"><div class="w-24 h-24 rounded-full bg-slate-100 border flex items-center justify-center overflow-hidden">${settings[tId].logo ? `<img src="${settings[tId].logo}" class="w-full h-full object-cover">` : `<i data-lucide="camera" class="text-slate-300"></i>`}</div><label class="absolute bottom-0 right-0 w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center cursor-pointer border-2 border-white"><input type="file" class="hidden" onchange="window.handleFileUpload('team', '${tId}', event)"><i data-lucide="edit-2" class="w-3 h-3"></i></label></div><div class="flex-1 w-full"><label class="text-xs font-black text-slate-400 uppercase mb-1 block text-slate-400">Název týmu</label><input type="text" value="${settings[tId].name}" onchange="window.updateTeamName('${tId}', this.value)" class="w-full px-4 py-3 bg-slate-50 border-2 rounded-xl font-black text-lg outline-none" /></div></div>
                <div class="grid grid-cols-1 gap-2 mt-4">${settings[tId].players.map(p => `<div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-transparent"><span class="font-bold text-slate-800">${p.name}</span><button onclick="window.removePlayer('${tId}', '${p.id}')" class="p-2 text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button></div>`).join('')}</div><div class="flex gap-2 mt-4"><input type="text" id="new-player-${tId}" placeholder="Jméno hráče" class="flex-1 px-4 py-4 bg-white border-2 border-slate-100 rounded-2xl font-bold outline-none" /><button onclick="window.addPlayer('${tId}')" class="bg-slate-900 text-white px-6 rounded-2xl font-black text-xl hover:bg-black">+</button></div></div>`).join('')}</div>`;
        }

        window.setAdminTab = (tab) => { adminTab = tab; render(); };
        function getTeamStats(tid) {
            const counts = {}; votes.filter(v => v.teamId === tid).forEach(v => counts[v.playerId] = (counts[v.playerId] || 0) + 1);
            return (settings[tid]?.players || []).map(p => ({ ...p, votes: counts[p.id] || 0 })).sort((a,b) => b.votes - a.votes);
        }
        function showError(msg) {
            const b = document.getElementById('error-box'); if (b) { document.getElementById('error-msg').innerText = msg; b.classList.remove('hidden'); }
        }
        window.hideError = () => document.getElementById('error-box')?.classList.add('hidden');

        init();
    </script>
</body>
</html>
